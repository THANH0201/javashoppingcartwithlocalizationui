
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopping-app
  labels:
    app: shopping-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shopping-app
  template:
    metadata:
      labels:
        app: shopping-app
    spec:
      containers:
        - name: shopping-app
          image: thanh0201/javashoppingcartwithlocalizationui:latest
          imagePullPolicy:  Always   # use Never for local images
          env:
            - name: DISPLAY
              value: "host.minikube.internal:0.0"
            - name: JAVA_TOOL_OPTIONS
              value: "-Dprism.order=sw"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
